<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FlavorOS — RISK (Editorial Warmth)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --background: #f7f7f5;
      --foreground: #18181b;
      --surface: #ffffff;
      --surface-muted: #fafaf9;
      --border: #e7e5e4;
      --muted: #78716c;
      --accent: #9a3412;
      --accent-fg: #fffbeb;
      --attention: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--background);
      color: var(--foreground);
      line-height: 1.5;
      padding: 2rem;
    }
    h1 { font-size: 1.75rem; font-weight: 600; margin: 0 0 0.5rem; }
    .sub { color: var(--muted); margin-bottom: 2rem; }
    .mock {
      display: grid;
      grid-template-columns: 220px 1fr;
      border: 1px solid #d6d3d1;
      border-radius: 12px;
      overflow: hidden;
      max-width: 960px;
      background: var(--surface);
    }
    .nav {
      background: var(--surface-muted);
      border-right: 1px solid var(--border);
      padding: 1.25rem 1rem;
      font-size: 13px;
    }
    .nav .active { border-left: 3px solid var(--accent); padding-left: calc(0.75rem - 3px); background: var(--surface); font-weight: 500; }
    .nav a { display: block; padding: 0.5rem 0.75rem; color: var(--muted); text-decoration: none; border-radius: 0 6px 6px 0; }
    .main { padding: 1.5rem; }
    .today h2 {
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
    }
    .today {
      background: linear-gradient(180deg, #fffbeb 0%, var(--surface-muted) 100%);
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .btn {
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: var(--accent-fg);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      border: none;
    }
  </style>
</head>
<body>
  <h1>RISK — Editorial Warmth</h1>
  <p class="sub">Copper accent <code>#9a3412</code> + serif Today headline. Same stone base as SAFE.</p>

  <div class="mock">
    <nav class="nav">
      <div style="font-weight:600;margin-bottom:1.5rem">FlavorOS</div>
      <a class="active" href="#">Command Center</a>
      <a href="#">Briefings</a>
      <a href="#">Meetings</a>
    </nav>
    <main class="main">
      <div class="today">
        <h2>Good morning, Alex</h2>
        <p style="margin:0;color:var(--muted);font-size:14px">Your operating picture · Standup ready</p>
      </div>
      <button class="btn" type="button">Approve draft reply</button>
    </main>
  </div>
</body>
</html>
