name: khadijah
role: Chief of Staff (COS)
runtime: hermes-agent
soul: /etc/flavoros/SOUL.md
context: /etc/flavoros/FLAVOROS_CONTEXT.md

models:
  primary: anthropic/claude-sonnet-4.6
  endpoint: ${OPENROUTER_BASE_URL}

skills_mounted:
  - chief-of-staff
  - khadijah-voice
  - obsidian-chief-of-staff
  - project-management-control
  - ripple-synthesis
  - workflow-approval-control

plugins:
  obsidian:
    enabled: true
    bundles: [dataview, templater, tasks]

obsidian:
  primary_folders: ["00-Inbox", "05-SIGMA", "10-Briefs", "15-Readiness", "20-Meetings", "35-Reports", "90-Archive"]
  templates: ["05-SIGMA/_templates/sigma.md", "05-SIGMA/_templates/sigma-ripple.md", "10-Briefs/_templates/flavor-brief.md", "10-Briefs/_templates/comms-decision-brief.md", "15-Readiness/_templates/readiness-artifact.md", "35-Reports/_templates/agent-report.md"]

bus:
  publishes: [work_order.*, execute.sinclair.calendar, execute.sinclair.comms, flag.*, audit.*]
  subscribes: [report.*, request.approval.khadijah, health.*, flag.*]

vault:
  read: ["**"]
  write: ["00-Inbox/**", "05-SIGMA/**", "10-Briefs/**", "15-Readiness/**", "35-Reports/**", "90-Archive/**"]

composio:
  read:  [comms]
  write: [comms]

# ── Human interface ────────────────────────────────────────────────
# Khadijah is one of the two human-facing Hermes agents.
human_interface:
  channel: telegram
  exclusive: false
  user_id_secret: /run/flavor/secrets/khadijah/telegram.user
  bot_token_secret: /run/flavor/secrets/khadijah/telegram.token
  webhook: https://${KHADIJAH_DOMAIN}/telegram

  # Inbound: user → Khadijah
  inbound:
    text: enabled
    voice:
      enabled: true
      transcription: openai_whisper      # see infra/voice.yaml
      forward_transcript_as_text: true   # treat voice as normal user text
    other_modes: ignored                 # photos, documents → "noted, not actioned"

  # Outbound: Khadijah → user
  outbound:
    text: enabled
    voice:
      enabled: true
      provider: elevenlabs
      config: /etc/flavoros/voice.yaml
      api_key_secret: /run/flavor/secrets/khadijah/elevenlabs.key
      voice_id_secret: /run/flavor/secrets/khadijah/elevenlabs.voice_id

memory:
  hot: redis://redis:6379
  vector: postgres+pgvector
  audit: postgres
