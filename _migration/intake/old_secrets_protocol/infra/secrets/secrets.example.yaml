# Plaintext template. Copy to secrets.yaml, fill in, then:
#   sops --encrypt --in-place secrets.yaml && mv secrets.yaml secrets.enc.yaml
#
# secrets.yaml is gitignored. Only secrets.enc.yaml is committed.

openrouter:
  api_key: sk-or-...

composio:
  workspace_api_key: composio_...

twilio:
  account_sid: ""
  auth_token: ""
  phone_number: ""
  messaging_service_sid: ""
  status_callback_url: ""

gemini:
  api_key: ""
  project_id: ""

telegram:
  khadijah_bot_token: ""
  sinclair_bot_token: ""
  user_id: "@KhadijahOS_bot"

# Voice surfaces
elevenlabs:
  api_key: ""
  khadijah_voice_id: "" # the cloned/library voice ID for Khadijah
  sinclair_voice_id: "" # the cloned/library voice ID for Sinclair

# Inbound voice transcription (user → Khadijah or Sinclair)
openai:
  api_key: "" # Whisper STT only; chat models route via OpenRouter

google:
  gmail_access_token: "" # optional short-lived override for MVP debugging
  gmail_refresh_token: "" # preferred durable Gmail OAuth secret for test administrator path
  oauth_client_id: ""
  oauth_client_secret: ""

# Client-scoped OAuth registry written by oauth_callback_service.py.
# The current MVP app-api still mirrors one Gmail grant into google.* above
# for compatibility, but new grants should also be stored here.
client_oauth: {}

postgres:
  password: change-me-strong

obsidian:
  git_remote: git@github.com:you/flavor-vault.git
  git_ssh_private_key: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    ...
    -----END OPENSSH PRIVATE KEY-----

# Optional: per-agent overrides (decrypted only for that agent's tmpfs)
agent_overrides:
  sinclair:
    apple_health_mcp_token: ""
    oura_personal_token: ""
    whoop_oauth_refresh: ""

# Composio connection_ids are written here AFTER `composio-init` runs.
# They are not secret on their own (they're opaque IDs), but we encrypt
# them anyway so the file stays uniformly protected.
composio_connections:
  email_biz_a: ""
  email_biz_b: ""
  email_personal: ""
  cal_biz_a: ""
  cal_biz_b: ""
  cal_personal: ""
  bank_biz_a: ""
  bank_biz_b: ""
  bank_personal: ""
  cards: ""
  books: ""
  crm_biz_a: ""
  crm_biz_b: ""
  pm_biz_a: ""
  pm_biz_b: ""
  travel: ""
  flights: ""
  hotels: ""
  social_li: ""
  social_x: ""
  comms: ""
