# FlavorOS 1.5 MVP agent roster.

agents:
  khadijah_conductor:
    runtime: cloud
    engine: hermes
    service: flavoros-agent-khadijah-hermes
    agent_config: agents/khadijah/agent.yaml
    instruction_root: agents/khadijah
    personas:
      - khadijah_orchestration
      - maxine_project_management
      - maxine_finance_oversight
    owns:
      - orchestration
      - briefings
      - approvals
      - projects
      - operations
      - finance_oversight
  sinclair_communications:
    runtime: local
    engine: hermes
    service: flavoros-agent-sinclair-hermes
    agent_config: agents/sinclair/agent.yaml
    instruction_root: agents/sinclair
    personas:
      - sinclair_executive_assistant
      - sinclair_preference_guardian
      - sinclair_wellness_guru
      - overton_secrets_butler
      - overton_household_management
    owns:
      - communications
      - calendar
      - provider_private_boundary
      - wellness_rhythm
      - household_sensitive_context
  regine_research_logistics:
    runtime: cloud
    engine: openclaw
    service: flavoros-agent-regine-openclaw
    agent_config: agents/regine/agent.yaml
    instruction_root: agents/regine
    personas:
      - scooter_travel_logistics
      - scooter_researcher
      - kyle_crm_relationships
      - regine_relationships
      - regine_lifestyle
      - regine_social_media
    owns:
      - research
      - travel
      - logistics
      - relationships
      - crm
      - brand_social_context

enabled:
  - khadijah_conductor
  - sinclair_communications
  - regine_research_logistics
